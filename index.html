<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FAF7F2">
<title>Beijing Offline Travel Guide</title>
<style>
:root{
  --pri:#B91C1C;--pri-d:#991B1B;--pri-l:#FEE2E2;
  --stone:#78716C;--ink:#1C1917;--paper:#FAF7F2;
  --bg:#F5F0E8;--card:#FFFCF7;--text:#292524;--sub:#78716C;--border:#E7E5E4;
  --green:#059669;--blue:#2563EB;--orange:#EA580C;--purple:#7C3AED;
  --shadow:0 4px 20px rgba(28,25,23,.08);--shadow-lg:0 12px 40px rgba(28,25,23,.12);
  --radius:14px;--glass:rgba(255,252,247,.92);
  --map-bg:#EDE8DE;
  --header-h:56px;--filter-h:42px;--bottom-nav-h:0px;
  --chrome-top:calc(var(--header-h) + var(--filter-h));
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100dvh;height:100vh;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;touch-action:manipulation}
button,input,select,textarea{font:inherit;touch-action:manipulation}
.top-bar{position:fixed;top:0;left:0;right:0;height:var(--header-h);padding-top:var(--safe-top);background:var(--glass);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding-left:max(12px,env(safe-area-inset-left));padding-right:max(12px,env(safe-area-inset-right));gap:8px;z-index:100;box-shadow:0 1px 0 rgba(28,25,23,.04)}
.app-title{font-size:14px;font-weight:700;color:var(--pri);white-space:nowrap;display:none}
.lang-btn{width:34px;height:34px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:700;cursor:pointer;transition:.2s;color:var(--sub)}
.lang-btn.active{background:linear-gradient(135deg,var(--pri),var(--pri-d));color:#fff;border-color:transparent}
.search-wrap{flex:1;position:relative;min-width:0}
.search-wrap input{width:100%;height:38px;border:1.5px solid var(--border);border-radius:20px;padding:0 36px 0 14px;font-size:14px;background:rgba(255,255,255,.75);outline:none}
.search-wrap input:focus{border-color:var(--pri);background:var(--card);box-shadow:0 0 0 3px rgba(185,28,28,.1)}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:24px;height:24px;border:none;background:var(--border);border-radius:50%;font-size:12px;cursor:pointer;color:var(--sub);pointer-events:auto;display:none;align-items:center;justify-content:center;line-height:1}
.search-clear.show{display:flex}
.top-btn{height:38px;min-width:38px;padding:0 10px;border-radius:11px;border:1px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:.2s;position:relative;color:var(--text)}
.top-btn .lbl{display:none;font-size:12px;font-weight:600}
.top-btn .badge{position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;background:var(--pri);color:#fff;border-radius:8px;font-size:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.filter-bar{position:fixed;top:calc(var(--header-h) + var(--safe-top));left:0;right:0;height:var(--filter-h);background:var(--glass);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 max(10px,env(safe-area-inset-left)) 0 max(10px,env(safe-area-inset-right));gap:6px;z-index:99;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-btn{height:30px;padding:0 14px;border-radius:15px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--sub)}
.filter-btn.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.sidebar-overlay{position:fixed;inset:0;background:rgba(28,25,23,.4);z-index:89;opacity:0;pointer-events:none;transition:opacity .3s}
.sidebar-overlay.show{opacity:1;pointer-events:auto}
.sidebar{position:fixed;top:calc(var(--chrome-top) + var(--safe-top));left:0;width:360px;bottom:0;background:var(--card);border-right:1px solid var(--border);z-index:90;transform:translateX(-100%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:var(--shadow-lg);padding-bottom:var(--safe-bottom)}
.sidebar.open{transform:translateX(0)}
.sidebar-handle{display:none}
.sidebar-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--sub)}
.sidebar-tab.active{color:var(--pri);border-bottom-color:var(--pri)}
.sidebar-body{flex:1;overflow-y:auto;padding:8px}
.poi-card{padding:12px 14px;border-radius:12px;cursor:pointer;transition:.2s;border:1px solid transparent;margin-bottom:6px}
.poi-card:hover{background:var(--bg);border-color:var(--border)}
.poi-card-row{display:flex;align-items:center;gap:8px}
.poi-card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.poi-card-info{flex:1;min-width:0}
.poi-card-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.poi-card-sub{font-size:11px;color:var(--sub);margin-top:1px}
.poi-card-actions{display:flex;gap:4px;flex-shrink:0}
.poi-card-btn{width:28px;height:28px;border:none;border-radius:50%;font-size:12px;cursor:pointer;background:var(--bg)}
.poi-card-btn.fav-active{color:var(--pri)}
.empty-state{text-align:center;padding:40px 20px;color:var(--sub);font-size:13px}
.day-block{margin-bottom:12px;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.day-head{padding:10px 12px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;gap:8px}
.day-head.active{background:var(--pri-l);color:var(--pri-d)}
.day-head-tap{flex:1;min-width:0;cursor:pointer}
.day-head-meta{display:flex;align-items:center;gap:4px;flex-shrink:0}
.day-count{min-width:18px;text-align:center;font-size:12px;color:var(--sub)}
.day-head.active .day-count{color:inherit;opacity:.85}
.day-act-btn{width:26px;height:26px;border:1px solid var(--border);background:var(--card);border-radius:6px;font-size:12px;cursor:pointer;line-height:1;padding:0}
.day-act-del{color:#991B1B}
.day-items{padding:4px 8px}
.itin-item{display:flex;align-items:center;gap:6px;padding:8px 4px;border-bottom:1px solid var(--border);font-size:12px;cursor:grab;transition:background .15s,opacity .15s}
.itin-item:last-child{border-bottom:none}
.itin-item.dragging{opacity:.45;background:var(--bg)}
.itin-item.drag-over{border-top:2px solid var(--pri);margin-top:-2px}
.itin-drag{width:16px;color:var(--sub);font-size:14px;flex-shrink:0;cursor:grab;text-align:center;line-height:1}
.preset-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.preset-btn{height:28px;padding:0 10px;border-radius:14px;border:1px solid var(--border);background:var(--card);font-size:11px;cursor:pointer;color:var(--text)}
.preset-btn:hover{border-color:var(--pri);color:var(--pri)}
.subway-legend{position:fixed;bottom:56px;right:16px;background:var(--glass);border-radius:10px;padding:8px 12px;box-shadow:var(--shadow);backdrop-filter:blur(8px);z-index:50;display:none;max-height:180px;overflow-y:auto;font-size:10px;border:1px solid var(--border)}
.subway-legend.show{display:block}
.subway-legend-title{font-size:11px;font-weight:700;margin-bottom:4px}
.subway-st-label{font-size:7px;fill:#444;opacity:0.85;pointer-events:none}
.subway-st-label.ix{font-size:8px;font-weight:700}
.subway-st-dot{fill:#fff;stroke:#333;stroke-width:0.8}
.subway-st-dot.ix{r:4}
.itin-num{width:20px;height:20px;border-radius:50%;background:var(--pri);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.itin-reorder{display:flex;flex-direction:column;gap:2px}
.itin-reorder button{width:22px;height:18px;border:1px solid var(--border);background:var(--card);border-radius:4px;font-size:10px;cursor:pointer}
.map-container{position:fixed;top:calc(var(--chrome-top) + var(--safe-top));left:0;right:0;bottom:calc(var(--bottom-nav-h) + var(--safe-bottom));z-index:1}
.map-svg{width:100%;height:100%;display:block;touch-action:none;background:#f0ede4;cursor:grab;-webkit-user-select:none;user-select:none}
.map-svg.grabbing{cursor:grabbing}
.map-controls{position:fixed;bottom:calc(16px + var(--bottom-nav-h) + var(--safe-bottom));right:max(12px,env(safe-area-inset-right));display:flex;flex-direction:column;gap:6px;z-index:50}
.ctrl-btn{width:44px;height:44px;border:1px solid var(--border);background:var(--glass);font-size:20px;cursor:pointer;border-radius:12px;backdrop-filter:blur(8px);color:var(--text)}
.map-legend{position:fixed;bottom:calc(16px + var(--bottom-nav-h) + var(--safe-bottom));left:max(12px,env(safe-area-inset-left));background:var(--glass);border-radius:12px;font-size:11px;box-shadow:var(--shadow);backdrop-filter:blur(10px);z-index:50;border:1px solid var(--border);max-width:200px;overflow:hidden}
.legend-toggle{padding:10px 14px;font-weight:700;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:11px}
.legend-body{padding:0 14px 12px;display:none}
.map-legend.open .legend-body{display:block}
.legend-item{display:flex;align-items:center;gap:6px;margin:4px 0;color:var(--sub)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.subway-toggle{position:fixed;bottom:calc(16px + var(--bottom-nav-h) + var(--safe-bottom));right:calc(64px + max(12px,env(safe-area-inset-right)));z-index:50;display:flex;align-items:center;gap:8px;background:var(--glass);padding:8px 14px;border-radius:22px;box-shadow:var(--shadow);cursor:pointer;border:1px solid var(--border);font-size:11px;font-weight:600;color:var(--sub);min-height:44px}
.subway-toggle .subway-lbl{display:inline}
.subway-toggle .dot{width:10px;height:10px;border-radius:50%;background:#CBD5E1;transition:.2s}
.subway-toggle.active .dot{background:var(--green)}
.subway-toggle.active{color:var(--text)}
.modal-overlay{position:fixed;inset:0;background:rgba(28,25,23,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;padding-top:calc(16px + var(--safe-top));padding-bottom:calc(16px + var(--safe-bottom))}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius);width:100%;max-width:460px;max-height:85vh;max-height:85dvh;overflow-y:auto;box-shadow:var(--shadow-lg);-webkit-overflow-scrolling:touch}
.modal-sheet-handle{display:none;width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 10px;flex-shrink:0}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:16px;font-weight:700}
.modal-close{width:32px;height:32px;border:none;background:var(--bg);border-radius:50%;font-size:18px;cursor:pointer}
.modal-body{padding:20px}
.poi-detail-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px}
.poi-detail-dot{width:14px;height:14px;border-radius:50%;margin-top:4px;flex-shrink:0}
.poi-detail-name{font-size:20px;font-weight:700}
.poi-detail-cat{display:inline-block;font-size:11px;color:var(--pri);margin-top:4px;background:var(--pri-l);padding:2px 8px;border-radius:6px;font-weight:600}
.poi-detail-desc{font-size:14px;line-height:1.6;color:var(--sub);margin-bottom:16px}
.poi-detail-info{display:flex;flex-direction:column;gap:10px}
.poi-detail-row{font-size:13px;line-height:1.5}
.poi-detail-row .label{display:block;font-size:11px;color:var(--sub);font-weight:600;margin-bottom:2px}
.poi-detail-row.tips-block{background:var(--bg);padding:10px 12px;border-radius:8px;border-left:3px solid var(--pri)}
.poi-detail-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.poi-detail-altnames{font-size:11px;color:var(--sub);line-height:1.6;margin-bottom:8px}
.poi-gaode-link{text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.poi-detail-row .addr-zh{color:var(--sub);font-size:12px;margin-top:2px}
.btn{height:40px;padding:0 18px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-pri{background:var(--pri);color:#fff}
.btn-outline{background:var(--card);border:1.5px solid var(--border);color:var(--text)}
.btn-green{background:var(--green);color:#fff}
.btn-sm{height:32px;padding:0 14px;font-size:12px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.form-group select,.form-group input,.form-group textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;outline:none;background:var(--card)}
.form-group textarea{min-height:72px;resize:vertical}
.coord-paste{font-family:monospace;font-size:12px}
.coord-type-btns{display:flex;gap:4px;margin-bottom:10px}
.coord-type-btn{flex:1;height:34px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:600;cursor:pointer}
.coord-type-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.poi-coord-row{display:flex;gap:8px}
.poi-coord-row input{flex:1}
.poi-preview{width:100%;height:180px;border:1px solid var(--border);border-radius:8px;margin:10px 0;overflow:hidden;background:var(--map-bg)}
.poi-preview svg{width:100%;height:100%}
.bbox-warn{background:#FEF3C7;color:#92400E;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;display:none}
.bbox-warn.show{display:block}
.ie-section{margin-bottom:18px}
.ie-section h4{font-size:14px;margin-bottom:8px}
.import-mode{display:flex;flex-direction:column;gap:6px;margin:8px 0 10px;font-size:12px}
.import-mode label{display:flex;align-items:center;gap:8px;cursor:pointer}
.ie-desc{font-size:12px;color:var(--sub);margin-bottom:10px;line-height:1.5}
.file-drop{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;font-size:13px;color:var(--sub)}
.toast{position:fixed;bottom:calc(80px + var(--bottom-nav-h) + var(--safe-bottom));left:50%;transform:translateX(-50%);background:rgba(28,25,23,.9);color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;z-index:300;pointer-events:none;opacity:0;transition:opacity .3s;max-width:calc(100vw - 32px);text-align:center}
.bottom-nav{display:none;position:fixed;left:0;right:0;bottom:0;height:calc(var(--bottom-nav-h) + var(--safe-bottom));padding:0 max(8px,env(safe-area-inset-left)) var(--safe-bottom) max(8px,env(safe-area-inset-right));background:var(--glass);backdrop-filter:blur(12px);border-top:1px solid var(--border);z-index:95;box-shadow:0 -1px 0 rgba(28,25,23,.04)}
.bottom-nav-inner{display:flex;align-items:stretch;justify-content:space-around;height:var(--bottom-nav-h);gap:4px}
.bottom-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;color:var(--sub);font-size:10px;font-weight:600;cursor:pointer;border-radius:10px;min-width:0;padding:4px 2px;position:relative}
.bottom-nav-btn .ico{font-size:20px;line-height:1}
.bottom-nav-btn .cap{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.bottom-nav-btn.active{color:var(--pri)}
.bottom-nav-btn .badge{position:absolute;top:2px;right:calc(50% - 22px);min-width:16px;height:16px;background:var(--pri);color:#fff;border-radius:8px;font-size:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.toast.show{opacity:1}
.tooltip{position:fixed;background:rgba(28,25,23,.92);color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;pointer-events:none;z-index:150;white-space:nowrap;opacity:0;transition:opacity .15s}
.tooltip.show{opacity:1}
.poi-marker{cursor:pointer;filter:url(#shadowF)}
.poi-marker .poi-visual{transition:r .12s,stroke-width .12s}
.poi-marker .poi-label{pointer-events:none;opacity:0;transition:opacity .12s}
.poi-marker.is-hover .poi-label,.poi-marker.is-selected .poi-label{opacity:1}
.map-svg text.dist-lbl{pointer-events:none;user-select:none}
@media(min-width:768px){
  .app-title{display:block}
  .top-btn .lbl{display:inline}
  .top-btn{min-width:auto;padding:0 12px}
}
@media(max-width:640px){
  :root{--header-h:50px;--filter-h:40px;--bottom-nav-h:56px}
  .top-bar .top-btn{display:none}
  .search-wrap input{height:40px;font-size:16px}
  .lang-btn{width:36px;height:36px}
  .filter-btn{height:32px;padding:0 12px;font-size:11px;flex-shrink:0}
  .poi-card{padding:14px 12px;-webkit-tap-highlight-color:transparent}
  .poi-card-btn{width:36px;height:36px;font-size:14px}
  .poi-card-name{font-size:14px}
  .sidebar{top:auto;left:0;right:0;width:100%;height:min(78dvh,calc(100dvh - var(--chrome-top) - var(--bottom-nav-h) - 8px));bottom:calc(var(--bottom-nav-h) + var(--safe-bottom));border-right:none;border-top:1px solid var(--border);border-radius:16px 16px 0 0;transform:translateY(calc(100% + 24px));padding-bottom:0}
  .sidebar.open{transform:translateY(0)}
  .sidebar-handle{display:block;width:40px;height:4px;border-radius:2px;background:var(--border);margin:8px auto 0;flex-shrink:0}
  .sidebar-head{padding:8px 16px 12px}
  .sidebar-tab{padding:12px 8px;font-size:12px}
  .subway-toggle .subway-lbl{display:none}
  .subway-toggle{padding:0;width:44px;height:44px;justify-content:center;border-radius:12px}
  .map-legend{max-width:148px;font-size:10px}
  .map-legend:not(.open) .legend-toggle{padding:8px 10px}
  .legend-body{padding:0 10px 10px}
  .modal-overlay{align-items:flex-end;padding:0}
  .modal{border-radius:16px 16px 0 0;max-height:92dvh;max-width:none;padding-bottom:var(--safe-bottom)}
  .modal-sheet-handle{display:block}
  .modal-head{padding:8px 16px 12px;position:sticky;top:0;background:var(--card);z-index:1}
  .modal-body{padding:16px}
  .poi-detail-name{font-size:18px}
  .poi-detail-actions .btn{flex:1;justify-content:center;min-width:calc(50% - 4px)}
  .btn{min-height:44px}
  .bottom-nav{display:block}
  .subway-legend{bottom:calc(72px + var(--bottom-nav-h) + var(--safe-bottom));right:12px;max-height:140px}
}
</style>
</head>
<body>
<div class="top-bar">
  <span class="app-title" id="appTitle">베이징 오프라인 여행 가이드</span>
  <button class="lang-btn active" onclick="setLang('ko')">한</button>
  <button class="lang-btn" onclick="setLang('en')">En</button>
  <button class="lang-btn" onclick="setLang('zh')">中</button>
  <div class="search-wrap">
    <input type="text" id="searchInput" autocomplete="off">
    <button class="search-clear" id="searchClear" type="button">×</button>
  </div>
  <button class="top-btn" onclick="toggleSidebar()" title="목록"><span class="lbl" id="btnListLbl">목록</span>☰</button>
  <button class="top-btn" onclick="openItineraryPanel()" title="일정"><span class="lbl" id="btnItinLbl">일정</span>📅<span class="badge" id="itinBadge" style="display:none">0</span></button>
  <button class="top-btn" onclick="openPOIModal()" title="장소 추가"><span class="lbl" id="btnAddLbl">추가</span>+</button>
  <button class="top-btn" onclick="openIOModal()" title="백업"><span class="lbl" id="btnIoLbl">백업</span>↓</button>
</div>
<div class="filter-bar" id="filterBar"></div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar(false)"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-handle" aria-hidden="true"></div>
  <div class="sidebar-head"><h3 id="sidebarTitle">목록</h3><button class="modal-close" onclick="toggleSidebar(false)">×</button></div>

function setupMapInteraction(){var svg=document.getElementById('mapSvg');svg.addEventListener('mousedown',onMapDown);svg.addEventListener('mousemove',onMapMove);svg.addEventListener('mouseup',onMapUp);svg.addEventListener('mouseleave',onMapUp);svg.addEventListener('wheel',onMapWheel,{passive:false});svg.addEventListener('contextmenu',onMapContext);svg.addEventListener('touchstart',onTouchStart,{passive:false});svg.addEventListener('touchmove',onTouchMove,{passive:false});svg.addEventListener('touchend',onTouchEnd);svg.addEventListener('touchcancel',onTouchEnd);document.querySelectorAll('.modal-overlay').forEach(function(ov){ov.addEventListener('click',function(e){if(e.target===ov)closeModal(ov.id);});});}
function onMapContext(e){e.preventDefault();var mp=screenToMap(e.clientX,e.clientY),lat=yToLat(mp.y),lng=xToLng(mp.x);openPOIModal(null,lat,lng);}
function onMapDown(e){if(e.target.closest&&e.target.closest('.poi-marker'))return;dragState={sx:e.clientX,sy:e.clientY,otx:mapView.tx,oty:mapView.ty,moved:false};svgClass('grabbing',true);longPressPt={x:e.clientX,y:e.clientY};longPressTimer=setTimeout(function(){if(!dragState||dragState.moved)return;var mp=screenToMap(longPressPt.x,longPressPt.y),lat=yToLat(mp.y),lng=xToLng(mp.x);openPOIModal(null,lat,lng);longPressTimer=null;},600);}
function onMapMove(e){if(!dragState)return;var dx=e.clientX-dragState.sx,dy=e.clientY-dragState.sy;if(Math.abs(dx)>3||Math.abs(dy)>3){if(S.hoverPoiId)setHoverPoi(null);dragState.moved=true;if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}}var svg=document.getElementById('mapSvg'),rect=svg.getBoundingClientRect(),vbW=mapView.w,vbH=mapView.h;mapView.tx=dragState.otx-dx/rect.width*vbW;mapView.ty=dragState.oty-dy/rect.height*vbH;applyMapTransform();}
function onMapUp(){dragState=null;svgClass('grabbing',false);if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}}
function onMapWheel(e){e.preventDefault();zoomMap(e.deltaY>0?1.15:0.87,e.clientX,e.clientY);}
function onTouchStart(e){if(e.touches.length===2){if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}dragState=null;var t0=e.touches[0],t1=e.touches[1];pinchState={startDist:touchDist(t0,t1),startW:mapView.w,mx:(t0.clientX+t1.clientX)/2,my:(t0.clientY+t1.clientY)/2};e.preventDefault();return;}if(e.touches.length!==1)return;var t0=e.touches[0];if(e.target.closest&&e.target.closest('.poi-marker')){dragState={markerTap:true,sx:t0.clientX,sy:t0.clientY,moved:false};return;}dragState={sx:t0.clientX,sy:t0.clientY,otx:mapView.tx,oty:mapView.ty,moved:false};longPressPt={x:t0.clientX,y:t0.clientY};longPressTimer=setTimeout(function(){if(!dragState||dragState.moved)return;var mp=screenToMap(longPressPt.x,longPressPt.y);openPOIModal(null,yToLat(mp.y),xToLng(mp.x));longPressTimer=null;},650);}
function onTouchMove(e){if(e.touches.length===2&&pinchState){e.preventDefault();var t0=e.touches[0],t1=e.touches[1],dist=touchDist(t0,t1),scale=dist/pinchState.startDist,mx=(t0.clientX+t1.clientX)/2,my=(t0.clientY+t1.clientY)/2,nw=Math.max(MAP_ZOOM_MIN_W,Math.min(MAP_ZOOM_MAX_W,pinchState.startW/scale));zoomMapAt(nw,mx,my);return;}if(!dragState||e.touches.length!==1)return;var t0=e.touches[0],dx=t0.clientX-dragState.sx,dy=t0.clientY-dragState.sy,threshold=dragState.markerTap?10:5;if(Math.abs(dx)>threshold||Math.abs(dy)>threshold){dragState.moved=true;if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}if(dragState.markerTap){dragState.markerTap=false;dragState.otx=mapView.tx;dragState.oty=mapView.ty;dragState.sx=t0.clientX;dragState.sy=t0.clientY;}}if(dragState.markerTap&&!dragState.moved)return;e.preventDefault();var svg=document.getElementById('mapSvg'),rect=svg.getBoundingClientRect(),vbW=mapView.w;mapView.tx=dragState.otx-(t0.clientX-dragState.sx)/rect.width*vbW;mapView.ty=dragState.oty-(t0.clientY-dragState.sy)/rect.height*mapView.h;applyMapTransform();}
function onTouchEnd(e){if(pinchState){pinchState=null;onMapUp();return;}if(dragState&&!dragState.moved){var t=(e.changedTouches&&e.changedTouches[0])||null;if(t)tryOpenMarkerAt(t.clientX,t.clientY);}onMapUp();}
function svgClass(c,on){document.getElementById('mapSvg').classList.toggle(c,on);}

function setupSearch(){var inp=document.getElementById('searchInput'),clr=document.getElementById('searchClear');if(S.search){inp.value=S.search;clr.classList.toggle('show',!!S.search);}inp.addEventListener('input',function(){S.search=inp.value;clr.classList.toggle('show',!!inp.value);renderSidebar();drawLandmarks();saveState();});clr.addEventListener('click',function(e){e.stopPropagation();inp.value='';S.search='';clr.classList.remove('show');renderSidebar();drawLandmarks();saveState();inp.focus();});}
function setupKeyboard(){document.addEventListener('keydown',function(e){if(e.key!=='Escape')return;var id=topOpenModal();if(id){e.preventDefault();closeModal(id);}else if(S.sidebarOpen&&isMobileUI())toggleSidebar(false);});}

function init(){try{loadState();S.sidebarOpen=false;document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('show');applyI18n();renderFilterBar();renderLegend();updateItinBadge();updateBottomNav();initStaticMap();drawLandmarks();drawRoute();resetView();var vis=S.showSubway?'':'none';document.getElementById('subwayLayer').style.display=vis;document.getElementById('subwayLabelLayer').style.display=vis;document.getElementById('subwayToggle').classList.toggle('active',S.showSubway);document.getElementById('subwayLegend').classList.toggle('show',S.showSubway);drawSubway();setupMapInteraction();setupSearch();setupKeyboard();setLang(S.lang);window.addEventListener('resize',function(){if(isMobileUI())drawLandmarks();});}catch(e){document.getElementById('mapContainer').innerHTML='<div style="padding:24px;color:#991B1B">지도 로드 오류: '+esc(e.message)+'</div>';}}
init();

</script>
</body>
